# Config file for [Air](https://github.com/air-verse/air) in Go

# Working directory
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # Just plain old go build command
  cmd = "go build -o ./tmp/main.exe ./cmd/api/main.go"
  # Binary file yields from `cmd`
  bin = ".\\tmp\\main.exe"
  # Customize binary option
  args_bin = []
  # Watch these filename extensions
  include_ext = ["go", "tpl", "html", "env"]
  # Ignore these filename extensions or directories
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "public"]
  # Watch these directories if you specified which are not in exclude_dir
  include_dir = []
  # Exclude files
  exclude_file = []
  # Exclude specific regular expressions
  exclude_regex = ["_test.go"]
  # Exclude unchanged files
  exclude_unchanged = false
  # Follow symlink for directories
  follow_symlink = false
  # This log file places in your tmp_dir
  log = "build-errors.log"
  # Poll files for changes instead of using fsnotify
  poll = false
  # Poll interval (ms)
  poll_interval = 0
  # Delay after trigger build (ms)
  delay = 1000
  # Stop running old binary when build errors occur
  stop_on_error = true
  # Send Interrupt signal instead of Kill signal (useful for graceful shutdown)
  send_interrupt = true
  # Delay before killing process (ms)
  kill_delay = "500ms"
  # Rerun process after each build
  rerun = false
  # Delay before rerunning process (ms)
  rerun_delay = 500

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true
